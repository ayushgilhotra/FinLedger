services:
  - type: web
    name: finledger-monolith
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server/src/server.js
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
